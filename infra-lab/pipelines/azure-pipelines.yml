trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'
  projectPath: 'src/Connells.Web/Connells.Web.csproj'
  testProjectPath: 'tests/Connells.Web.Tests/Connells.Web.Tests.csproj'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Build Application'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - script: dotnet restore $(projectPath)
            displayName: 'Restore NuGet packages'

          - script: dotnet build $(projectPath) --configuration $(buildConfiguration) --no-restore
            displayName: 'Build solution'

